<!DOCTYPE html>

<html>
  <head>
    <title>
        Rock Paper Scissors
    </title>
  </head>

  <body>

    <p>Rock Paper Scissors</p>
    
    <!--Rock button-->
    <button onclick="

      //computerMove
      pickComputerMove();
		          
      //result                  
      playGame('Rock');
    ">
      Rock
    </button>


		<!--Paper button-->
		<button onclick="
      
      //computer move 
      pickComputerMove();      
            
		  //result            
      playGame('Paper');
    ">
      Paper
    </button>

		<!--Scissors button-->
    <button onclick="
      
      //computer move
      pickComputerMove();
                 
      //result            
      playGame('Scissors');
    ">
      Scissors
    </button>

    <p class="js-result"></p>

    <p class="js-moves"></p>

    <p class="js-score"></p>

    <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      updateScoreElement();
    ">
      Reset Score
    </button>
     


    <script type="module" src="script.js"></script>
		
  </body>
</html>
