<!DOCTYPE html>

<html>
  <head>
    <title>
        Rock Paper Scissors
    </title>
  </head>

  <body>

    <p>Rock Paper Scissors</p>
    
    <!--Rock button-->
    <button class="js-btn" data-val="Rock">
      Rock
    </button>


		<!--Paper button-->
		<button class="js-btn" data-val="Paper">
      Paper
    </button>

		<!--Scissors button-->
    <button class="js-btn" data-val="Scissors">
      Scissors
    </button>

    <p class="js-result"></p>

    <p class="js-moves"></p>

    <p class="js-score"></p>

    <button class="js-btn" id="reset-btn">
      Reset Score
    </button>
     


    <script type="module" src="script.js"></script>
		
  </body>
</html>
