<!DOCTYPE html>

<html>

	<head>
		<title> Calculator </title>
		<link rel="stylesheet" href="style.css">
	</head>

	<body>

		<div class="container">
			<p class="calculator">Calculator</p>

			<p class="displayCalc"></p>

			<div>
				<button class="js-btn" data-val="1"> 
					1 
				</button>
				
				<button class="js-btn" data-val="2"> 
					2 
				</button>
				
				<button class="js-btn" data-val="3"> 
					3 
				</button>
				
				<button class="js-btn" data-val="+"> 
					+ 
				</button>
			</div>

			<div>
				<button class="js-btn" data-val="4"> 
					4 
				</button>
				
				<button class="js-btn" data-val="5"> 
					5 
				</button>
				
				<button class="js-btn" data-val="6"> 
					6 
				</button>
				
				<button class="js-btn" data-val="-"> 
					- 
				</button>
			</div>

			<div>
				<button class="js-btn" data-val="7"> 
						7 
				</button>
				
				<button class="js-btn" data-val="8"> 
						8 
				</button>
				
				<button class="js-btn" data-val="9"> 
						9 
				</button>
				
				<button class="js-btn" data-val="*"> 
						* 
				</button>
			</div>

			<div>
				<button class="js-btn" data-val="0"> 
						0 
				</button>
				
				<button class="js-btn" data-val="."> 
						. 
				</button>
				
				<button id="js-equals"> 
						= 
				</button>
				
				<button class="js-btn" data-val="/"> 
						/ 
				</button>

			</div>

			<div>
				<button id="js-clear"> Clear </button>
			</div>
		</div>
		<script type="module" src="script.js">
      
		</script>
	</body>
</html>
